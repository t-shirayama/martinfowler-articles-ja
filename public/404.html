<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Martin Fowler Articles JA</title>
    <script>
      const base = '/martinfowler-articles-ja/'
      const path = window.location.pathname
      const route = path.startsWith(base) ? path.slice(base.length - 1) : path
      window.location.replace(base + '?route=' + encodeURIComponent(route) + window.location.search + window.location.hash)
    </script>
  </head>
  <body></body>
</html>
